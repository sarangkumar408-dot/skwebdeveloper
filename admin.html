<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Web Solutions | Admin Inbox</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="brand"><span>SK</span> Web Solutions</div>
            <nav class="main-nav" id="main-nav">
                <a href="index.html">Home</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#work">Work</a>
                <a href="index.html#contact">Contact</a>
            </nav>
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">Menu</button>
        </div>
    </header>

    <main>
        <section class="section section-contact">
            <div class="container admin-grid">
                <div class="contact-info card">
                    <p class="eyebrow">Admin inbox</p>
                </div>
                <div class="card" id="admin-login-card">
                    <p class="eyebrow">Admin login</p>
                    <h2>Enter credentials</h2>
                    <form id="admin-login-form">
                        <div class="form-group">
                            <label for="admin-username">Username</label>
                            <input id="admin-username" type="text" placeholder="admin" required>
                        </div>
                        <div class="form-group">
                            <label for="admin-password">Password</label>
                            <input id="admin-password" type="password" placeholder="Password" required>
                        </div>
                        <button type="submit" class="button button-primary">Login</button>
                        <p id="admin-status" class="contact-note">Use the admin credentials above to access the inbox.</p>
                    </form>
                </div>

                <!-- Visit Statistics Section -->
                <div class="card admin-visit-stats hidden" id="admin-visit-stats">
                    <div class="admin-inbox-header">
                        <div>
                            <p class="eyebrow">Analytics</p>
                            <h2>Website Visit Statistics</h2>
                        </div>
                        <div>
                            <button id="refresh-visits" class="button button-secondary">Refresh</button>
                            <button id="clear-visits" class="button button-secondary">Clear All</button>
                        </div>
                    </div>
                    <div class="visit-stats-grid" id="visit-stats-summary"></div>
                    <div class="visit-history-section">
                        <h3>Recent Visits</h3>
                        <div id="visit-history-list"></div>
                        <div id="visit-pagination"></div>
                    </div>
                </div>

                <div class="card admin-inbox hidden" id="admin-inbox">
                    <div class="admin-inbox-header">
                        <div>
                            <p class="eyebrow">Inbox</p>
                            <h2>Client messages</h2>
                        </div>
                        <button id="admin-clear-messages" class="button button-secondary">Clear all</button>
                    </div>
                    <div class="admin-stats-grid" id="admin-stats"></div>
                    <div id="admin-message-list"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>© 2026 SK Web Solutions. Admin inbox for client messages.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
